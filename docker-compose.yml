version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: automarche-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: automarche
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d automarche"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: automarche-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/automarche
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-automarche-prod-secret-key-change-me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-change-me-in-production}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/fatura-ocr
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads

  n8n:
    image: n8nio/n8n:latest
    container_name: automarche-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  uploads_data:
  n8n_data:
